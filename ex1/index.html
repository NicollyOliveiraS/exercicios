<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Horas Extras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <form >
        <a href="../index.html" class="btn-voltar">Voltar</a>
        <h1>Cálculo de Horas Extras</h1>

        <label>Salário Mensal:</label>
        <input type="number" id="salarioBruto" placeholder="Ex: 2000">

        <label>Horas Extras (dias úteis):</label>
        <input type="number" id="horasExtrasNormais" placeholder="Ex: 10">

        <label>Horas Extras (fins de semana):</label>
        <input type="number" id="horasExtrasFinaisSemana" placeholder="Ex: 5">

        <input type="button" id="calcular" value="Calcular">

        <p id="resultado"></p>

    </form>
 <footer class="mt-12 pt-6 border-t border-zinc-700 flex items-center justify-center gap-2 text-zinc-300">
      <div class="flex items-center gap-2">
        <span>📅</span>
        <span id="dataAtual">Carregando data ...</span>
      </div>
      <div class="flex items-center gap-2">
        <span>🕒</span>
        <span id="horaAtual" class="font-mono text-xl">00:00:00</span>
      </div> 
    
    </footer></div>

    <script src="script.js"></script>
    <script src="../datahora.js"></script>
</body>
</html>
