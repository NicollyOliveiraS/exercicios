<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte de Colaboradores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Desenvolva um programa onde o gerente deverá informar a quantidade de
funcionários que necessitarão de transporte fretado e a quantidade de dias úteis em
que o transporte deverá acontecer.
1 a 49 pessoas valor: R$4.50  
50 a 99 R$4.10
100 a 149 R$3.80
150 a + R$3.60 -->
 <div class="container">
    <a href="../index.html" class="btn-voltar">Voltar</a>
    <h1>Transporte de Colaboradores</h1>
    <label for="colaboradores">Quantidade de Colaboradores</label>
    <input type="number" id="colaboradores" placeholder="Digite a quantidade de colaboradores">

    <label for="dias">Quantidade de Dias Úteis</label>
    <input type="number" id="dias" placeholder="Digite a quantidade de dias úteis">

    <button id="calcular">Calcular Valor</button>
    <p id="resultado"></p>
 </div>
 <script src="script.js"></script>
</body>
</html>
